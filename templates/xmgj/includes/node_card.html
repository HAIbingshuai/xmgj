{% load xmgj_tags %}
<div class="timeline-item {% if node.pk == selected_pk %}selected{% endif %}">
    <div class="timeline-marker {{ node.status|node_status_class }}"><div class="timeline-dot"></div></div>
    <div class="timeline-node-card-wrap">
        <div class="timeline-node-card" data-detail-url="{% url 'xmgj:node_detail' node.item.pk node.pk %}">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <span class="node-date"><i class="bi bi-calendar3 me-1"></i>{{ node.node_date|date:"m-d" }}</span>
                <span class="d-flex align-items-center gap-1">
                    <span class="badge badge-node bg-{{ node.status|status_color }}">{{ node.get_status_display }}</span>
                    <button class="btn btn-sm p-0 border-0 node-edit-btn"
                            style="width:18px;height:18px;border-radius:4px;color:var(--gray-300);font-size:0.65rem;opacity:0;transition:all 0.15s;display:inline-flex;align-items:center;justify-content:center;background:transparent;"
                            title="编辑节点"
                            data-node-id="{{ node.pk }}"
                            data-item-id="{{ node.item.pk }}"
                            data-title="{{ node.title }}"
                            data-summary="{{ node.summary|default:'' }}"
                            data-date="{{ node.node_date|date:'Y-m-d' }}"
                            data-status="{{ node.status }}">
                        <i class="bi bi-pencil"></i>
                    </button>
                </span>
            </div>
            <div class="node-title">{{ node.title }}</div>
            {% if node.summary %}
            <div class="node-summary">{{ node.summary }}</div>
            {% endif %}
            <div class="d-flex justify-content-between align-items-center">
                <span class="node-step-progress"><i class="bi bi-check2-square me-1"></i>{{ node.completed_step_count }}/{{ node.step_count }}</span>
            </div>
        </div>
    </div>
</div>
