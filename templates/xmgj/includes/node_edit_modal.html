{% load static %}
<div class="modal fade" id="nodeEditModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border:none;border-radius:14px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);overflow:hidden;">
            <div class="modal-body p-0">
                <div class="px-4 pt-4 pb-0 d-flex justify-content-between align-items-start">
                    <div>
                        <h5 class="modal-title fw-bold" style="color:var(--gray-900);font-size:1.05rem;">
                            <i class="bi bi-pencil me-2" style="color:var(--primary);"></i>编辑节点
                        </h5>
                        <p class="text-muted mb-0" style="font-size:0.8rem;margin-top:2px;">修改时间轴节点信息</p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" style="font-size:0.8rem;margin-top:4px;"></button>
                </div>

                <form method="post" id="nodeEditModalForm" class="px-4 pt-3 pb-4" novalidate>
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label" style="font-size:0.82rem;color:var(--gray-700);font-weight:600;">
                            节点标题 <span class="text-danger">*</span>
                        </label>
                        <input type="text" name="title" id="edit-node-title" class="form-control" placeholder="节点标题" required autofocus
                               style="font-size:0.88rem;padding:0.55rem 0.75rem;border-radius:8px;">
                    </div>

                    <div class="mb-3">
                        <label class="form-label" style="font-size:0.82rem;color:var(--gray-700);font-weight:600;">
                            概要
                        </label>
                        <textarea name="summary" id="edit-node-summary" class="form-control auto-resize" rows="2" placeholder="节点概要"
                                  style="font-size:0.88rem;padding:0.5rem 0.75rem;border-radius:8px;"></textarea>
                    </div>

                    <div class="row g-3 mb-0">
                        <div class="col-md-6">
                            <label class="form-label" style="font-size:0.82rem;color:var(--gray-700);font-weight:600;">
                                节点日期 <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0" style="border-radius:8px 0 0 8px;">
                                    <i class="bi bi-calendar3" style="color:var(--gray-400);font-size:0.85rem;"></i>
                                </span>
                                <input type="text" name="node_date" id="edit-node-date" class="form-control flatpickr border-start-0" placeholder="选择日期" required
                                       style="font-size:0.88rem;padding:0.5rem 0.75rem;border-radius:0 8px 8px 0;">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" style="font-size:0.82rem;color:var(--gray-700);font-weight:600;">
                                状态 <span class="text-danger">*</span>
                            </label>
                            <select name="status" id="edit-node-status" class="form-select" required
                                    style="font-size:0.88rem;padding:0.5rem 0.75rem;border-radius:8px;">
                                <option value="pending">待处理</option>
                                <option value="in_progress">进行中</option>
                                <option value="completed">已完成</option>
                                <option value="skipped">已跳过</option>
                            </select>
                        </div>
                    </div>

                    <div class="alert alert-danger mt-3 mb-0" id="nodeEditError" style="display:none;font-size:0.82rem;border-radius:8px;padding:8px 12px;">
                        <i class="bi bi-exclamation-circle me-1"></i>
                        <span id="nodeEditErrorText"></span>
                    </div>

                    <div class="d-flex gap-2 mt-4 pt-3" style="border-top:1px solid var(--gray-100);">
                        <button type="submit" class="btn btn-primary px-4" id="nodeEditSubmit" style="border-radius:8px;padding:0.5rem 1.2rem;">
                            <i class="bi bi-check-lg me-1"></i> 保存修改
                        </button>
                        <button type="button" class="btn btn-outline-secondary px-3" data-bs-dismiss="modal" style="border-radius:8px;padding:0.5rem 1rem;">
                            取消
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    var modal = document.getElementById('nodeEditModal');
    if (!modal) return;
    var form = document.getElementById('nodeEditModalForm');
    var submitBtn = document.getElementById('nodeEditSubmit');
    var errorAlert = document.getElementById('nodeEditError');
    var errorText = document.getElementById('nodeEditErrorText');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> 保存中...';
        errorAlert.style.display = 'none';
        var formData = new FormData(form);
        fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                window.location.href = data.redirect_url;
            } else {
                errorText.textContent = data.error || '请检查输入的内容';
                errorAlert.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-check-lg me-1"></i> 保存修改';
            }
        })
        .catch(function() {
            errorText.textContent = '网络错误，请重试';
            errorAlert.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="bi bi-check-lg me-1"></i> 保存修改';
        });
    });
    modal.addEventListener('hidden.bs.modal', function() {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-check-lg me-1"></i> 保存修改';
        errorAlert.style.display = 'none';
    });
})();
</script>
