{% extends 'xmgj/base.html' %}

{% block title %}确认删除步骤 - 项目管家{% endblock %}

{% block content %}
<div class="container-fluid px-3 py-5" style="flex:1;overflow-y:auto;">
    <div class="row justify-content-center">
        <div class="col-lg-4">
            <div class="card shadow-sm border-0" style="border-radius:10px;">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size:2.5rem;"></i>
                    <h5 class="fw-bold mt-3" style="color:#2C3E50;">确认删除步骤</h5>
                    <p class="text-muted">确定要删除步骤「<strong>{{ object.content|truncatechars:40 }}</strong>」吗？<br>关联的附件和图片将一并删除。</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2 justify-content-center">
                            <button type="submit" class="btn btn-danger"><i class="bi bi-trash3 me-1"></i>确认删除</button>
                            <a href="{% url 'xmgj:item_detail' object.node.item.pk %}?node={{ object.node.pk }}" class="btn btn-outline-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
